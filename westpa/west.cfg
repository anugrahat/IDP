# WESTPA configuration for α-synuclein + fasudil association
# 2D pcoord: (min heavy-atom distance ligand↔C-term residues 125-140,  Rg(α-syn CA))
# MAB adaptive binning, pmemd.cuda propagator under MPS
---
west:
  system:
    driver: westpa.core.systems.WESTSystem
    system_options:
      pcoord_ndim: 2
      pcoord_len: 100          # 100 frames per 100 ps segment (1 ps stride, ntwx=500, nstlim=50000)
      pcoord_dtype: !!python/name:numpy.float32
      bins:
        type: MABBinMapper
        nbins: [12, 6]         # 12 adaptive bins along distance, 6 along Rg
        direction: [-1, 0]     # track extremes in -dist direction (push toward bound state); no extremes for Rg
        bottleneck: true       # MAB bottleneck bins on top of density bins
      bin_target_counts: 2      # 2 walkers/bin → ~48 active walkers as idea.md specifies
  propagation:
    max_total_iterations: 500
    max_run_wallclock:    167:30:00
    propagator:           executable
    gen_istates:          false
  data:
    west_data_file: west.h5
    datasets:
      - name:        pcoord
        dtype:       float32
        scaleoffset: 4
      - name:        contact_map     # per-residue minimum distance, ligand → residue heavy atoms
        dtype:       float32
        scaleoffset: 3
      - name:        ring_dists      # Y125 / Y133 / Y136 ring-centroid distances to fasudil aromatic centroid
        dtype:       float32
        scaleoffset: 3
      - name:        d135_charge_dist # fasudil cationic N → D135 carboxylate-O min distance
        dtype:       float32
        scaleoffset: 3
    data_refs:
      segment:       $WEST_SIM_ROOT/traj_segs/{segment.n_iter:06d}/{segment.seg_id:06d}
      basis_state:   $WEST_SIM_ROOT/bstates/{basis_state.auxref}
      initial_state: $WEST_SIM_ROOT/istates/{initial_state.iter_created}/{initial_state.state_id}.rst
  plugins:
  executable:
    environ:
      PROPAGATION_DEBUG: 1
    datasets:
      - name:    contact_map
        loader:  aux_loader_text
        enabled: true
      - name:    ring_dists
        loader:  aux_loader_text
        enabled: true
      - name:    d135_charge_dist
        loader:  aux_loader_text
        enabled: true
    propagator:
      executable: $WEST_SIM_ROOT/westpa_scripts/runseg.sh
      stdout:     $WEST_SIM_ROOT/seg_logs/{segment.n_iter:06d}-{segment.seg_id:06d}.log
      stderr:     stdout
      stdin:      null
      cwd:        null
      environ:
        SEG_DEBUG: 1
    get_pcoord:
      executable: $WEST_SIM_ROOT/westpa_scripts/get_pcoord.sh
      stdout:     /dev/null
      stderr:     stdout
    gen_istate:
      executable: $WEST_SIM_ROOT/westpa_scripts/gen_istate.sh
      stdout:     /dev/null
      stderr:     stdout
    post_iteration:
      enabled:    true
      executable: $WEST_SIM_ROOT/westpa_scripts/post_iter.sh
      stderr:     stdout
    pre_iteration:
      enabled:    false
      executable: $WEST_SIM_ROOT/westpa_scripts/pre_iter.sh
      stderr:     stdout
