# Conda env for WESTPA pipeline + docking analysis (existing env).
# Python 3.9 — needed for compatibility with WESTPA 2022.11 + older parmed.
#
# Versions captured from a working install on 2026-05-16.

name: openmm_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - parmed=4.3.0
  - mdanalysis>=2.2
  - h5py
  - pip:
      - westpa==2022.11
      # Ligand prep tools (also installed here for docking control experiment)
      - rdkit
      - meeko
      - openbabel-wheel
      - gemmi
      - vina
      - prolif==2.0.3
      - pytest
